# ~/.config/tmux/tmux.conf

# Auto-install TPM if it's missing
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# ========== GENERAL ==========
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -s escape-time 0
set -g focus-events on
setw -g aggressive-resize on
set -g allow-passthrough on
setw -g automatic-rename on

# ========== KEY BINDINGS ==========
# Update reload to the new config path
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Last window toggle (Jump back and forth)
bind L last-window

# Pane navigation (vim-tmux-navigator handles C-h/j/k/l)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window switching
bind -n S-Left previous-window
bind -n S-Right next-window

# Session switcher
bind s choose-tree -Zs

# Clear screen (works with v-t-n)
bind C-l send-keys 'C-l'

# Synchronize panes toggle
bind S set-window-option synchronize-panes\; display "Sync: #{?pane_synchronized,ON,OFF}"

# Pane <-> Window conversions
bind b break-pane -d                    
bind j command-prompt -p "Join pane from window:" "join-pane -h -s '%%'"

# Kill without confirmation
bind x kill-pane
bind X kill-window
bind Q confirm-before -p "Kill session #S? (y/n)" kill-session

# ========== COPY MODE ==========
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ========== DISPLAY ==========
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g status-position top

# ========== PLUGINS ==========
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# ========== STATUS BAR (Custom) ==========
set -g status-style bg=default,fg=white  # Transparent/default background with white text
set -g status-left-length 30    
set -g status-justify centre    
set -g status-right-length 150  
set -g status-left '#[fg=cyan,bold] [#S] '  # Cyan session name
set -g status-right '#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}") #[fg=yellow]%H:%M #[fg=blue]%d-%b-%y'

# Session persistence settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15' # Save every 15 minutes (default)
set -g @resurrect-strategy-nvim 'session'

run '~/.config/tmux/plugins/tpm/tpm'
